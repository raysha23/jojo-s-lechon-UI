<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lechon Order System</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="card">
      <h1>Lechon Order System</h1>
      <p class="subtitle">Sign in to your account</p>

      <div class="tabs">
        <button class="active">Encoder</button>
        <button>Admin</button>
      </div>

      <label for="username">Username</label>
      <div class="input-group">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0116.5 0"
          />
        </svg>
        <input type="text" id="username" placeholder="Enter username" />
      </div>

      <label for="password">Password</label>
      <div class="input-group">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
          />
        </svg>
        <input type="password" id="password" placeholder="Enter password" />
      </div>

      <p class="forgot">
        <a href="#">Forgot <span>password?</span></a>
      </p>

      <button class="btn">Sign In as Encoder</button>

      <div class="demo">
        <strong>Demo Credentials:</strong><br />
        Username: encoder<br />
        Password: encoder123
      </div>
    </div>
    <script src="js/login.js"></script>
  </body>
</html>
