<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lechon Order System - Admin</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>

  <body class="bg-gray-100 text-gray-800 font-sans text-base">
    <!-- NAVBAR -->
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Lechon Order System</h1>
        <p class="text-lg text-orange-600 italic">
          Customer Order Recording & Management
        </p>
      </div>

      <div class="flex items-center gap-4 text-base text-gray-600">
        Logged in as
        <span class="font-semibold text-orange-600">Admin User</span>

        <button class="px-3 py-1 border rounded text-sm hover:bg-gray-100">
          Admin
        </button>

        <button class="text-base hover:text-red-600" id="logoutBtn">
          Logout
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="max-w-full mx-auto mt-8 px-4">
      <div class="bg-white rounded-xl shadow p-6">
        <h2 class="text-3xl font-bold text-gray-900">Admin - View Bookings</h2>

        <p class="text-xl text-orange-600 mb-4">
          Filter orders by delivery date
        </p>

        <!-- FILTER -->
        <div class="flex flex-wrap justify-between items-center gap-3 mb-5">
          <input
            type="date"
            id="filterDate"
            class="border rounded px-4 py-2 text-base"
          />

          <button
            onclick="printOrders()"
            class="bg-gray-900 text-white px-5 py-2 rounded text-base hover:bg-gray-700"
          >
            Print Orders
          </button>
        </div>

        <!-- TABLE -->
        <div
          class="overflow-x-auto border border-gray-300 rounded-lg shadow-sm"
        >
          <table
            class="w-full text-base text-left border-collapse text-center bg-white border border-gray-300"
          >
            <thead
              class="bg-gray-50 text-[#8b4513] uppercase sticky top-0 border-b"
            >
              <tr>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Delivery Time
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Customer Name
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Order Type
                </th>
                <th class="p-4 font-bold min-w-[350px] max-w-[500px]">
                  Order Details
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Total Amount
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Process Time
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Location
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Facebook
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Contact
                </th>
                <th
                  class="p-4 font-bold whitespace-nowrap border border-gray-300"
                >
                  Payment Method
                </th>
                <th class="p-4 font-bold text-center">Actions</th>
              </tr>
            </thead>

            <tbody
              id="ordersTableBody"
              class="divide-y divide-gray-100"
            ></tbody>
          </table>
        </div>

        <p
          id="orderSummary"
          class="text-right font-bold mt-4 text-gray-900 text-lg"
        ></p>
      </div>
    </div>
    <script src="js/admin.js"></script>
  </body>
</html>
