<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lechon Order System</title>
    <link rel="stylesheet" href="css/output.css" />
  </head>

  <body
    class="bg-[#fdf5e6] min-h-screen flex items-center justify-center font-sans p-4"
  >
    <div
      class="bg-white rounded-xl shadow-lg p-10 w-full max-w-md border border-gray-100"
    >
      <h1 class="text-center text-2xl font-bold text-[#1a1a2e] mb-1">
        Lechon Order System
      </h1>
      <p class="text-center text-gray-400 text-sm mb-6">
        Sign in to your account
      </p>

      <!-- TABS -->
      <div
        class="tabs flex bg-gray-100 p-1 rounded-lg border border-gray-200 mb-6"
      >
        <button
          id="tab-encoder"
          class="flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow-sm text-[#1a1a2e]"
        >
          Encoder
        </button>

        <button
          id="tab-admin"
          class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-700"
        >
          Admin
        </button>
      </div>

      <!-- FORM -->
      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-bold text-[#1a1a2e] mb-1.5">
            Username
          </label>
          <input
            type="text"
            id="username"
            class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm"
            placeholder="Enter username"
          />
        </div>

        <div class="mb-5">
          <label class="block text-sm font-bold text-[#1a1a2e] mb-1.5">
            Password
          </label>
          <input
            type="password"
            id="password"
            class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm"
            placeholder="Enter password"
          />
        </div>

        <button
          type="button"
          class="btn w-full bg-[#1a1a2e] hover:bg-[#2a2a4e] text-white font-bold py-3 rounded-lg mb-6"
        >
          Sign In as Encoder
        </button>
      </form>

      <!-- DEMO -->
      <div
        class="bg-purple-50 rounded-lg p-4 text-center text-sm text-gray-600 border border-purple-100"
      >
        <strong class="text-gray-800">Demo Credentials:</strong><br />
        encoder / encoder123
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
